<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creator Finance Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f7ff; min-height: 100vh; padding: 1.5rem 1rem 6rem; }
    .wrap { max-width: 480px; margin: 0 auto; }
    .header p { font-size: 13px; color: #3a8fd1; }
    .header h1 { font-size: 22px; font-weight: 500; color: #0a3d6b; margin-bottom: 1.25rem; }
    .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .month-nav button { background: #dbeeff; border: 0.5px solid #a8d4f5; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #0a3d6b; }
    .month-nav button:hover { background: #c5e4ff; }
    .month-nav span { font-size: 14px; font-weight: 500; flex: 1; text-align: center; color: #0a3d6b; }
    .toggle-row { display: flex; background: #dbeeff; border-radius: 10px; padding: 4px; margin-bottom: 1.25rem; gap: 4px; }
    .toggle-btn { flex: 1; padding: 8px; font-size: 14px; font-weight: 500; border: none; border-radius: 7px; cursor: pointer; background: transparent; color: #3a8fd1; transition: background 0.2s, color 0.2s; }
    .toggle-btn.active { background: #ffffff; color: #0a3d6b; border: 0.5px solid #a8d4f5; }
    .total-card { border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; background: #dbeeff; }
    .total-card.expense { background: #ffe8d6; }
    .total-card .label { font-size: 13px; color: #3a8fd1; margin-bottom: 4px; }
    .total-card.expense .label { color: #c4622a; }
    .total-card .amount { font-size: 36px; font-weight: 500; color: #0a3d6b; }
    .total-card.expense .amount { color: #7c2d00; }
    .total-card .change { font-size: 13px; color: #3a8fd1; margin-top: 4px; }
    .total-card.expense .change { color: #c0392b; }
    .sources-title { font-size: 11px; font-weight: 500; color: #3a8fd1; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .chart-wrap { display: flex; align-items: center; gap: 24px; }
    .donut-container { position: relative; width: 150px; height: 150px; flex-shrink: 0; }
    .donut-container svg { width: 150px; height: 150px; }
    .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
    .donut-center .amt { font-size: 16px; font-weight: 500; color: #0a3d6b; }
    .donut-center .lbl { font-size: 11px; color: #3a8fd1; margin-top: 2px; }
    .legend { flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid #a8d4f5; }
    .legend-item:last-child { border-bottom: none; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { font-size: 13px; color: #0a3d6b; flex: 1; }
    .legend-pct { font-size: 12px; color: #3a8fd1; margin-right: 2px; }
    .legend-amt { font-size: 13px; font-weight: 500; color: #0a3d6b; }
    .legend-del { font-size: 16px; color: #c0392b; margin-left: 4px; opacity: 0; transition: opacity 0.15s; cursor: pointer; }
    .legend-item:hover .legend-del { opacity: 1; }
    .net-card { display: flex; justify-content: space-between; align-items: center; background: #dbeeff; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1.25rem; }
    .net-label { font-size: 13px; color: #3a8fd1; }
    .net-amount { font-size: 20px; font-weight: 500; }
    .net-positive { color: #0a3d6b; }
    .net-negative { color: #c0392b; }
    .add-btn { position: fixed; bottom: 28px; right: 28px; width: 52px; height: 52px; border-radius: 50%; background: #0a3d6b; color: #fff; font-size: 26px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(10,61,107,0.25); transition: background 0.2s, transform 0.1s; z-index: 100; }
    .add-btn:hover { background: #3a8fd1; transform: scale(1.08); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(10,61,107,0.25); z-index: 200; align-items: flex-end; justify-content: center; }
    .overlay.open { display: flex; }
    .sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-width: 480px; }
    .sheet h2 { font-size: 18px; font-weight: 500; color: #0a3d6b; margin-bottom: 1.25rem; }
    .form-row { margin-bottom: 14px; }
    .form-row label { font-size: 12px; color: #3a8fd1; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .type-btn { flex: 1; padding: 10px; border: 0.5px solid #a8d4f5; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: #f0f7ff; color: #3a8fd1; transition: background 0.2s, color 0.2s; }
    .type-btn.active.income { background: #dbeeff; color: #0a3d6b; border-color: #3a8fd1; }
    .type-btn.active.expense { background: #ffe8d6; color: #7c2d00; border-color: #f4a261; }
    .source-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
    .source-chip { padding: 10px 6px; border: 0.5px solid #a8d4f5; border-radius: 10px; font-size: 12px; font-weight: 500; cursor: pointer; background: #f0f7ff; color: #0a3d6b; text-align: center; transition: background 0.15s, border 0.15s; }
    .source-chip:hover { background: #dbeeff; }
    .source-chip.selected { background: #0a3d6b; color: #fff; border-color: #0a3d6b; }
    .source-chip.custom-chip { border-style: dashed; color: #3a8fd1; }
    .custom-input-row { display: none; margin-bottom: 10px; }
    .custom-input-row.show { display: block; }
    .form-row input { width: 100%; padding: 10px 12px; border: 0.5px solid #a8d4f5; border-radius: 8px; font-size: 15px; color: #0a3d6b; background: #f0f7ff; outline: none; }
    .form-row input:focus { border-color: #3a8fd1; }
    .sheet-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .btn-cancel { flex: 1; padding: 12px; border: 0.5px solid #a8d4f5; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: transparent; color: #3a8fd1; }
    .btn-add { flex: 2; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: #0a3d6b; color: #fff; }
    .btn-add:hover { background: #3a8fd1; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #0a3d6b; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <p>Finance tracker</p>
    <h1>Creator dashboard</h1>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <span id="month-label">March 2026</span>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="toggle-row">
    <button class="toggle-btn active" id="btn-income" onclick="setMode('income')">Income</button>
    <button class="toggle-btn" id="btn-expense" onclick="setMode('expense')">Expenses</button>
  </div>
  <div class="total-card" id="total-card">
    <div class="label" id="total-label">Total income</div>
    <div class="amount" id="total-amount">$8,420</div>
    <div class="change" id="total-change">+12% vs last month</div>
  </div>
  <div class="sources-title" id="breakdown-title">Income breakdown</div>
  <div class="chart-wrap">
    <div class="donut-container">
      <svg viewBox="0 0 150 150" id="donut-svg"></svg>
      <div class="donut-center">
        <div class="amt" id="center-amt"></div>
        <div class="lbl" id="center-lbl">total</div>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
  <div class="net-card">
    <span class="net-label">Net this month</span>
    <span class="net-amount net-positive" id="net-amount">+$3,170</span>
  </div>
</div>

<button class="add-btn" onclick="openSheet()">+</button>
<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="sheet" id="sheet">
    <h2>Add transaction</h2>
    <div class="type-toggle">
      <button class="type-btn active income" id="type-income" onclick="setType('income')">Income</button>
      <button class="type-btn expense" id="type-expense" onclick="setType('expense')">Expense</button>
    </div>
    <div class="form-row">
      <label id="source-label">Source</label>
      <div class="source-grid" id="source-grid"></div>
      <div class="custom-input-row" id="custom-input-row">
        <input type="text" id="input-custom" placeholder="Type source name..." />
      </div>
    </div>
    <div class="form-row">
      <label>Amount ($)</label>
      <input type="number" id="input-amount" placeholder="0.00" min="0" />
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
      <button class="btn-add" onclick="addTransaction()">Add</button>
    </div>
  </div>
</div>

<script>
  const INCOME_COLORS = ["#0a3d6b","#3a8fd1","#7ec8e3","#f4a261","#5bb8f5","#1a6fa8","#f5d97a"];
  const EXPENSE_COLORS = ["#c0392b","#e07b5a","#f5c97a","#7c2d00","#f4a261","#e8b86d","#aaa"];

  const INCOME_SOURCES = ["YouTube","Venmo","Cash App","PayPal","Stripe","Sponsorship","Merch","Patreon","Direct deposit"];
  const EXPENSE_SOURCES = ["Rent","Food","Software","Equipment","Ads","Transport","Utilities","Subscriptions","Other"];

  const months = {
    0: { label: "March 2026",
      income:  { change: "+12% vs last month", items: [
        { name: "YouTube", amount: 3800 }, { name: "Venmo", amount: 2150 },
        { name: "Direct deposit", amount: 1600 }, { name: "Cash App", amount: 870 },
      ]},
      expense: { change: "+4% vs last month", items: [
        { name: "Rent", amount: 2200 }, { name: "Software", amount: 1100 },
        { name: "Food", amount: 950 }, { name: "Other", amount: 1000 },
      ]},
    },
    "-1": { label: "February 2026",
      income:  { change: "+6% vs last month", items: [
        { name: "YouTube", amount: 3200 }, { name: "Venmo", amount: 1980 },
        { name: "Direct deposit", amount: 1600 }, { name: "Cash App", amount: 730 },
      ]},
      expense: { change: "-2% vs last month", items: [
        { name: "Rent", amount: 2200 }, { name: "Software", amount: 1000 },
        { name: "Food", amount: 850 }, { name: "Other", amount: 1000 },
      ]},
    },
  };

  let offset = 0, mode = "income", entryType = "income", selectedSource = null;

  function getColors() { return mode === "income" ? INCOME_COLORS : EXPENSE_COLORS; }
  function getTotal(items) { return items.reduce((s, x) => s + x.amount, 0); }

  function buildSourceGrid() {
    const sources = entryType === "income" ? INCOME_SOURCES : EXPENSE_SOURCES;
    document.getElementById("source-label").textContent = entryType === "income" ? "Source" : "Category";
    selectedSource = null;
    document.getElementById("custom-input-row").classList.remove("show");
    document.getElementById("input-custom").value = "";
    document.getElementById("source-grid").innerHTML =
      sources.map(s => `<div class="source-chip" onclick="selectSource('${s}', this)">${s}</div>`).join("") +
      `<div class="source-chip custom-chip" onclick="selectSource('__custom__', this)">+ Custom</div>`;
  }

  function selectSource(name, el) {
    selectedSource = name;
    document.querySelectorAll(".source-chip").forEach(c => c.classList.remove("selected"));
    el.classList.add("selected");
    if (name === "__custom__") {
      document.getElementById("custom-input-row").classList.add("show");
      document.getElementById("input-custom").focus();
    } else {
      document.getElementById("custom-input-row").classList.remove("show");
    }
  }

  function drawDonut(items, total, highlightIdx = -1) {
    const svg = document.getElementById("donut-svg");
    svg.innerHTML = "";
    const cx = 75, cy = 75, r = 55, sw = 26;
    let angle = -Math.PI / 2;
    const colors = getColors();
    items.forEach((s, i) => {
      const sweep = (s.amount / total) * 2 * Math.PI;
      const gap = 0.03;
      const a1 = angle + gap / 2, a2 = angle + sweep - gap / 2;
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      const large = sweep > Math.PI ? 1 : 0;
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", colors[i % colors.length]);
      path.setAttribute("stroke-width", highlightIdx === i ? sw + 5 : sw);
      path.setAttribute("stroke-linecap", "round");
      path.style.opacity = highlightIdx === -1 || highlightIdx === i ? "1" : "0.3";
      path.style.cursor = "pointer";
      path.style.transition = "stroke-width 0.2s, opacity 0.2s";
      path.addEventListener("mouseenter", () => {
        drawDonut(items, total, i);
        document.getElementById("center-amt").textContent = "$" + s.amount.toLocaleString();
        document.getElementById("center-lbl").textContent = s.name;
      });
      path.addEventListener("mouseleave", () => {
        drawDonut(items, total, -1);
        document.getElementById("center-amt").textContent = "$" + total.toLocaleString();
        document.getElementById("center-lbl").textContent = "total";
      });
      svg.appendChild(path);
      angle += sweep;
    });
  }

  function renderLegend(items, total) {
    const colors = getColors();
    document.getElementById("legend").innerHTML = items.map((s, i) => {
      const pct = Math.round(s.amount / total * 100);
      return `<div class="legend-item">
        <div class="legend-dot" style="background:${colors[i % colors.length]};"></div>
        <span class="legend-name">${s.name}</span>
        <span class="legend-pct">${pct}%</span>
        <span class="legend-amt">$${s.amount.toLocaleString()}</span>
        <span class="legend-del" onclick="deleteItem('${s.name}')">&#215;</span>
      </div>`;
    }).join("");
  }

  function deleteItem(name) {
    const d = months[offset] || months[0];
    const list = d[mode].items;
    const idx = list.findIndex(x => x.name === name);
    if (idx > -1) { list.splice(idx, 1); render(); showToast(name + " removed"); }
  }

  function render() {
    const d = months[offset] || months[0];
    const data = d[mode];
    const items = data.items;
    const total = getTotal(items);
    const net = getTotal(d.income.items) - getTotal(d.expense.items);

    document.getElementById("month-label").textContent = d.label;
    document.getElementById("total-amount").textContent = "$" + total.toLocaleString();
    document.getElementById("total-change").textContent = data.change;
    document.getElementById("center-amt").textContent = "$" + total.toLocaleString();
    document.getElementById("center-lbl").textContent = "total";
    document.getElementById("total-card").className = "total-card" + (mode === "expense" ? " expense" : "");
    document.getElementById("total-label").textContent = mode === "income" ? "Total income" : "Total expenses";
    document.getElementById("breakdown-title").textContent = mode === "income" ? "Income breakdown" : "Expense breakdown";

    const netEl = document.getElementById("net-amount");
    netEl.textContent = (net >= 0 ? "+" : "-") + "$" + Math.abs(net).toLocaleString();
    netEl.className = "net-amount " + (net >= 0 ? "net-positive" : "net-negative");

    drawDonut(items, total);
    renderLegend(items, total);
  }

  function setMode(m) {
    mode = m;
    document.getElementById("btn-income").className = "toggle-btn" + (m === "income" ? " active" : "");
    document.getElementById("btn-expense").className = "toggle-btn" + (m === "expense" ? " active" : "");
    render();
  }

  function changeMonth(dir) {
    const next = offset + dir;
    if (months[next]) { offset = next; render(); }
  }

  function openSheet() {
    entryType = mode;
    document.getElementById("type-income").className = "type-btn" + (entryType === "income" ? " active income" : "");
    document.getElementById("type-expense").className = "type-btn" + (entryType === "expense" ? " active expense" : "");
    buildSourceGrid();
    document.getElementById("input-amount").value = "";
    document.getElementById("overlay").classList.add("open");
  }

  function closeSheet() { document.getElementById("overlay").classList.remove("open"); }
  function closeIfOutside(e) { if (e.target === document.getElementById("overlay")) closeSheet(); }

  function setType(t) {
    entryType = t;
    document.getElementById("type-income").className = "type-btn" + (t === "income" ? " active income" : "");
    document.getElementById("type-expense").className = "type-btn" + (t === "expense" ? " active expense" : "");
    buildSourceGrid();
  }

  function addTransaction() {
    let name = selectedSource;
    if (name === "__custom__") name = document.getElementById("input-custom").value.trim();
    const amount = parseFloat(document.getElementById("input-amount").value);
    if (!name || !amount || amount <= 0) { showToast("Pick a source and enter an amount"); return; }
    const mo = months[offset] || months[0];
    const list = mo[entryType].items;
    const existing = list.find(x => x.name.toLowerCase() === name.toLowerCase());
    if (existing) { existing.amount += amount; }
    else { list.push({ name, amount }); }
    mo[entryType].change = "updated manually";
    closeSheet();
    if (mode !== entryType) setMode(entryType);
    else render();
    showToast("$" + amount.toLocaleString() + " added to " + name);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  render();
</script>
</body>
</html>
