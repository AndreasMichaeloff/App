<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creator Income Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; padding: 1.5rem 1rem; }
    .dash { max-width: 480px; margin: 0 auto; }
    .header { margin-bottom: 1.5rem; }
    .header p { font-size: 13px; color: #888780; margin-top: 2px; }
    .header h1 { font-size: 22px; font-weight: 500; color: #2c2c2a; }
    .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
    .month-nav button { background: #ebebeb; border: 0.5px solid #d3d1c7; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #2c2c2a; }
    .month-nav button:hover { background: #e0e0e0; }
    .month-nav span { font-size: 14px; font-weight: 500; flex: 1; text-align: center; color: #2c2c2a; }
    .total-card { background: #ebebeb; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .total-card .label { font-size: 13px; color: #888780; margin-bottom: 4px; }
    .total-card .amount { font-size: 36px; font-weight: 500; color: #2c2c2a; }
    .total-card .change { font-size: 13px; color: #3b6d11; margin-top: 4px; }
    .sources-title { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .source-card { background: #ffffff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .source-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; flex-shrink: 0; }
    .source-info { flex: 1; }
    .source-name { font-size: 14px; font-weight: 500; color: #2c2c2a; }
    .source-txns { font-size: 12px; color: #888780; margin-top: 1px; }
    .source-amount { font-size: 16px; font-weight: 500; color: #2c2c2a; }
    .bar-row { margin-top: 6px; }
    .bar-bg { height: 4px; background: #f1efe8; border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .prev-months { margin-top: 1.5rem; }
    .prev-month-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 0.5px solid #d3d1c7; }
    .prev-month-row:last-child { border-bottom: none; }
    .prev-month-name { font-size: 13px; color: #888780; width: 60px; flex-shrink: 0; }
    .prev-month-bar-bg { flex: 1; height: 4px; background: #f1efe8; border-radius: 2px; overflow: hidden; }
    .prev-month-bar-fill { height: 100%; border-radius: 2px; background: #7F77DD; }
    .prev-month-amt { font-size: 13px; font-weight: 500; color: #2c2c2a; width: 64px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="dash">
    <div class="header">
      <p>Income tracker</p>
      <h1>Creator dashboard</h1>
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8592;</button>
      <span id="month-label">March 2026</span>
      <button onclick="changeMonth(1)">&#8594;</button>
    </div>

    <div class="total-card">
      <div class="label">Total income</div>
      <div class="amount" id="total-amount">$8,420</div>
      <div class="change" id="total-change">+12% vs last month</div>
    </div>

    <div class="sources-title">Income sources</div>
    <div id="sources-list"></div>

    <div class="prev-months">
      <div class="sources-title">Previous months</div>
      <div id="prev-months-list"></div>
    </div>
  </div>

  <script>
    const data = {
      0: {
        label: "March 2026",
        total: 8420,
        change: "+12% vs last month",
        sources: [
          { name: "YouTube", txns: "4 payments", amount: 3800, color: "#E24B4A", textColor: "#791F1F", pct: 100 },
          { name: "Venmo", txns: "11 transfers", amount: 2150, color: "#7F77DD", textColor: "#3C3489", pct: 57 },
          { name: "Direct deposit", txns: "2 payments", amount: 1600, color: "#1D9E75", textColor: "#085041", pct: 42 },
          { name: "Cash App", txns: "7 transfers", amount: 870, color: "#639922", textColor: "#27500A", pct: 23 },
        ]
      },
      "-1": {
        label: "February 2026",
        total: 7510,
        change: "+6% vs last month",
        sources: [
          { name: "YouTube", txns: "3 payments", amount: 3200, color: "#E24B4A", textColor: "#791F1F", pct: 100 },
          { name: "Venmo", txns: "9 transfers", amount: 1980, color: "#7F77DD", textColor: "#3C3489", pct: 62 },
          { name: "Direct deposit", txns: "2 payments", amount: 1600, color: "#1D9E75", textColor: "#085041", pct: 50 },
          { name: "Cash App", txns: "5 transfers", amount: 730, color: "#639922", textColor: "#27500A", pct: 23 },
        ]
      },
      "-2": {
        label: "January 2026",
        total: 7080,
        change: "+3% vs last month",
        sources: [
          { name: "YouTube", txns: "3 payments", amount: 2900, color: "#E24B4A", textColor: "#791F1F", pct: 100 },
          { name: "Venmo", txns: "8 transfers", amount: 1850, color: "#7F77DD", textColor: "#3C3489", pct: 64 },
          { name: "Direct deposit", txns: "2 payments", amount: 1600, color: "#1D9E75", textColor: "#085041", pct: 55 },
          { name: "Cash App", txns: "6 transfers", amount: 730, color: "#639922", textColor: "#27500A", pct: 25 },
        ]
      }
    };

    const prevMonths = [
      { name: "Feb", amount: 7510, pct: 89 },
      { name: "Jan", amount: 7080, pct: 84 },
      { name: "Dec", amount: 6900, pct: 82 },
      { name: "Nov", amount: 6200, pct: 74 },
    ];

    let offset = 0;

    function getInitials(name) {
      return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
    }

    function render() {
      const d = data[offset] || data[0];
      document.getElementById("month-label").textContent = d.label;
      document.getElementById("total-amount").textContent = "$" + d.total.toLocaleString();
      document.getElementById("total-change").textContent = d.change;

      const list = document.getElementById("sources-list");
      list.innerHTML = d.sources.map(s => `
        <div class="source-card">
          <div class="source-icon" style="background:${s.color}20; color:${s.textColor};">${getInitials(s.name)}</div>
          <div class="source-info">
            <div class="source-name">${s.name}</div>
            <div class="source-txns">${s.txns}</div>
            <div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${s.pct}%;background:${s.color};"></div></div></div>
          </div>
          <div class="source-amount">$${s.amount.toLocaleString()}</div>
        </div>
      `).join("");

      const prev = document.getElementById("prev-months-list");
      prev.innerHTML = prevMonths.map(m => `
        <div class="prev-month-row">
          <span class="prev-month-name">${m.name}</span>
          <div class="prev-month-bar-bg"><div class="prev-month-bar-fill" style="width:${m.pct}%;"></div></div>
          <span class="prev-month-amt">$${m.amount.toLocaleString()}</span>
        </div>
      `).join("");
    }

    function changeMonth(dir) {
      const newOffset = offset + dir;
      if (data[newOffset]) offset = newOffset;
      render();
    }

    render();
  </script>
</body>
</html>
