<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creator Finance Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; padding: 1.5rem 1rem; }
    .wrap { max-width: 480px; margin: 0 auto; }
    .header p { font-size: 13px; color: #888780; }
    .header h1 { font-size: 22px; font-weight: 500; color: #2c2c2a; margin-bottom: 1.25rem; }
    .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .month-nav button { background: #ebebeb; border: 0.5px solid #d3d1c7; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #2c2c2a; }
    .month-nav button:hover { background: #e0e0e0; }
    .month-nav span { font-size: 14px; font-weight: 500; flex: 1; text-align: center; color: #2c2c2a; }
    .toggle-row { display: flex; background: #ebebeb; border-radius: 10px; padding: 4px; margin-bottom: 1.25rem; gap: 4px; }
    .toggle-btn { flex: 1; padding: 8px; font-size: 14px; font-weight: 500; border: none; border-radius: 7px; cursor: pointer; background: transparent; color: #888780; transition: background 0.2s, color 0.2s; }
    .toggle-btn.active { background: #ffffff; color: #2c2c2a; border: 0.5px solid #d3d1c7; }
    .total-card { border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .total-card.income { background: #e1f5ee; }
    .total-card.expense { background: #fcebeb; }
    .total-card .label { font-size: 13px; margin-bottom: 4px; }
    .total-card.income .label { color: #0f6e56; }
    .total-card.expense .label { color: #a32d2d; }
    .total-card .amount { font-size: 36px; font-weight: 500; }
    .total-card.income .amount { color: #085041; }
    .total-card.expense .amount { color: #791f1f; }
    .total-card .change { font-size: 13px; margin-top: 4px; }
    .total-card.income .change { color: #3b6d11; }
    .total-card.expense .change { color: #a32d2d; }
    .sources-title { font-size: 11px; font-weight: 500; color: #888780; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .chart-wrap { display: flex; align-items: center; gap: 24px; }
    .donut-container { position: relative; width: 150px; height: 150px; flex-shrink: 0; }
    .donut-container svg { width: 150px; height: 150px; }
    .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
    .donut-center .amt { font-size: 16px; font-weight: 500; color: #2c2c2a; }
    .donut-center .lbl { font-size: 11px; color: #888780; margin-top: 2px; }
    .legend { flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid #d3d1c7; }
    .legend-item:last-child { border-bottom: none; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { font-size: 13px; color: #2c2c2a; flex: 1; }
    .legend-pct { font-size: 12px; color: #888780; margin-right: 2px; }
    .legend-amt { font-size: 13px; font-weight: 500; color: #2c2c2a; }
    .net-card { display: flex; justify-content: space-between; align-items: center; background: #ebebeb; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1.25rem; }
    .net-card .net-label { font-size: 13px; color: #888780; }
    .net-card .net-amount { font-size: 20px; font-weight: 500; }
    .net-positive { color: #085041; }
    .net-negative { color: #791f1f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <p>Finance tracker</p>
      <h1>Creator dashboard</h1>
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8592;</button>
      <span id="month-label">March 2026</span>
      <button onclick="changeMonth(1)">&#8594;</button>
    </div>

    <div class="toggle-row">
      <button class="toggle-btn active" id="btn-income" onclick="setMode('income')">Income</button>
      <button class="toggle-btn" id="btn-expense" onclick="setMode('expense')">Expenses</button>
    </div>

    <div class="total-card income" id="total-card">
      <div class="label" id="total-label">Total income</div>
      <div class="amount" id="total-amount">$8,420</div>
      <div class="change" id="total-change">+12% vs last month</div>
    </div>

    <div class="sources-title" id="breakdown-title">Income breakdown</div>
    <div class="chart-wrap">
      <div class="donut-container">
        <svg viewBox="0 0 150 150" id="donut-svg"></svg>
        <div class="donut-center">
          <div class="amt" id="center-amt"></div>
          <div class="lbl" id="center-lbl">total</div>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="net-card">
      <span class="net-label">Net this month</span>
      <span class="net-amount net-positive" id="net-amount">+$3,170</span>
    </div>
  </div>

  <script>
    const months = {
      0: { label: "March 2026",
        income:  { total: 8420, change: "+12% vs last month", items: [
          { name: "YouTube", amount: 3800, color: "#E24B4A" },
          { name: "Venmo",   amount: 2150, color: "#7F77DD" },
          { name: "Direct deposit", amount: 1600, color: "#1D9E75" },
          { name: "Cash App", amount: 870, color: "#639922" },
        ]},
        expense: { total: 5250, change: "+4% vs last month", items: [
          { name: "Rent",     amount: 2200, color: "#E24B4A" },
          { name: "Software", amount: 1100, color: "#7F77DD" },
          { name: "Food",     amount: 950,  color: "#EF9F27" },
          { name: "Other",    amount: 1000, color: "#888780" },
        ]},
      },
      "-1": { label: "February 2026",
        income:  { total: 7510, change: "+6% vs last month", items: [
          { name: "YouTube", amount: 3200, color: "#E24B4A" },
          { name: "Venmo",   amount: 1980, color: "#7F77DD" },
          { name: "Direct deposit", amount: 1600, color: "#1D9E75" },
          { name: "Cash App", amount: 730,  color: "#639922" },
        ]},
        expense: { total: 5050, change: "-2% vs last month", items: [
          { name: "Rent",     amount: 2200, color: "#E24B4A" },
          { name: "Software", amount: 1000, color: "#7F77DD" },
          { name: "Food",     amount: 850,  color: "#EF9F27" },
          { name: "Other",    amount: 1000, color: "#888780" },
        ]},
      },
      "-2": { label: "January 2026",
        income:  { total: 7080, change: "+3% vs last month", items: [
          { name: "YouTube", amount: 2900, color: "#E24B4A" },
          { name: "Venmo",   amount: 1850, color: "#7F77DD" },
          { name: "Direct deposit", amount: 1600, color: "#1D9E75" },
          { name: "Cash App", amount: 730,  color: "#639922" },
        ]},
        expense: { total: 5150, change: "+1% vs last month", items: [
          { name: "Rent",     amount: 2200, color: "#E24B4A" },
          { name: "Software", amount: 1050, color: "#7F77DD" },
          { name: "Food",     amount: 900,  color: "#EF9F27" },
          { name: "Other",    amount: 1000, color: "#888780" },
        ]},
      },
    };

    let offset = 0;
    let mode = "income";

    function drawDonut(items, total, highlightIdx = -1) {
      const svg = document.getElementById("donut-svg");
      svg.innerHTML = "";
      const cx = 75, cy = 75, r = 55, sw = 26;
      let angle = -Math.PI / 2;
      items.forEach((s, i) => {
        const sweep = (s.amount / total) * 2 * Math.PI;
        const gap = 0.03;
        const a1 = angle + gap / 2, a2 = angle + sweep - gap / 2;
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
        const large = sweep > Math.PI ? 1 : 0;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", s.color);
        path.setAttribute("stroke-width", highlightIdx === i ? sw + 5 : sw);
        path.setAttribute("stroke-linecap", "round");
        path.style.opacity = highlightIdx === -1 || highlightIdx === i ? "1" : "0.3";
        path.style.cursor = "pointer";
        path.style.transition = "stroke-width 0.2s, opacity 0.2s";
        path.addEventListener("mouseenter", () => {
          drawDonut(items, total, i);
          document.getElementById("center-amt").textContent = "$" + s.amount.toLocaleString();
          document.getElementById("center-lbl").textContent = s.name;
        });
        path.addEventListener("mouseleave", () => {
          drawDonut(items, total, -1);
          document.getElementById("center-amt").textContent = "$" + total.toLocaleString();
          document.getElementById("center-lbl").textContent = "total";
        });
        svg.appendChild(path);
        angle += sweep;
      });
    }

    function renderLegend(items, total) {
      document.getElementById("legend").innerHTML = items.map(s => {
        const pct = Math.round(s.amount / total * 100);
        return `<div class="legend-item">
          <div class="legend-dot" style="background:${s.color};"></div>
          <span class="legend-name">${s.name}</span>
          <span class="legend-pct">${pct}%</span>
          <span class="legend-amt">$${s.amount.toLocaleString()}</span>
        </div>`;
      }).join("");
    }

    function render() {
      const d = months[offset] || months[0];
      const data = d[mode];
      const net = d.income.total - d.expense.total;

      document.getElementById("month-label").textContent = d.label;
      document.getElementById("total-amount").textContent = "$" + data.total.toLocaleString();
      document.getElementById("total-change").textContent = data.change;
      document.getElementById("center-amt").textContent = "$" + data.total.toLocaleString();
      document.getElementById("center-lbl").textContent = "total";

      document.getElementById("total-card").className = "total-card " + mode;
      document.getElementById("total-label").textContent = mode === "income" ? "Total income" : "Total expenses";
      document.getElementById("breakdown-title").textContent = mode === "income" ? "Income breakdown" : "Expense breakdown";

      const netEl = document.getElementById("net-amount");
      netEl.textContent = (net >= 0 ? "+" : "-") + "$" + Math.abs(net).toLocaleString();
      netEl.className = "net-amount " + (net >= 0 ? "net-positive" : "net-negative");

      drawDonut(data.items, data.total);
      renderLegend(data.items, data.total);
    }

    function setMode(m) {
      mode = m;
      document.getElementById("btn-income").className = "toggle-btn" + (m === "income" ? " active" : "");
      document.getElementById("btn-expense").className = "toggle-btn" + (m === "expense" ? " active" : "");
      render();
    }

    function changeMonth(dir) {
      const next = offset + dir;
      if (months[next]) { offset = next; render(); }
    }

    render();
  </script>
</body>
</html>
