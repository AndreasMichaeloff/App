<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#fffdf7"/>
  <title>Filo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fffdf7; min-height: 100vh; padding: env(safe-area-inset-top, 1.5rem) 1rem calc(env(safe-area-inset-bottom, 0px) + 6rem) 1rem; }
    .wrap { max-width: 480px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-left p { font-size: 13px; color: #bbb; margin-bottom: 4px; }
    .toggle-row { display: flex; margin-bottom: 1.25rem; gap: 8px; }
    .toggle-btn { flex: 1; padding: 13px 10px; font-size: 15px; font-weight: 600; border: 2px solid; border-radius: 12px; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .toggle-btn:active { transform: scale(0.97); }
    .toggle-btn.income-active { background: #e8b84b; color: #fff; border-color: #e8b84b; }
    .toggle-btn.expense-active { background: #e07050; color: #fff; border-color: #e07050; }
    .toggle-btn.inactive-income { background: #fff; color: #c49a3a; border-color: #e8b84b; }
    .toggle-btn.inactive-expense { background: #fff; color: #c05030; border-color: #e07050; }
    .month-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .month-nav button { background: #f5f5f5; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 10px 18px; font-size: 14px; cursor: pointer; color: #444; transition: background 0.15s, transform 0.1s; }
    .month-nav button:active { transform: scale(0.95); background: #eee; }
    .month-nav span { font-size: 15px; font-weight: 600; flex: 1; text-align: center; color: #222; }
    .total-card { border-radius: 18px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .total-card.income { background: #e8b84b; }
    .total-card.expense { background: #e07050; }
    .total-card .label { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 4px; }
    .total-card .amount { font-size: 42px; font-weight: 700; color: #fff; letter-spacing: -1px; }
    .total-card .change-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .total-card .change-pill { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .pill-good { background: rgba(255,255,255,0.3); color: #fff; }
    .pill-bad { background: rgba(0,0,0,0.15); color: #fff; }
    .total-card .change-label { font-size: 13px; color: rgba(255,255,255,0.75); }
    .sources-title { font-size: 11px; font-weight: 600; color: #bbb; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .chart-wrap { display: flex; align-items: center; gap: 20px; }
    .donut-container { position: relative; width: 155px; height: 155px; flex-shrink: 0; }
    .donut-container svg { width: 155px; height: 155px; }
    .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
    .donut-center .amt { font-size: 16px; font-weight: 700; color: #222; }
    .donut-center .lbl { font-size: 11px; color: #aaa; margin-top: 2px; }
    .legend { flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid #f0f0f0; }
    .legend-item:last-child { border-bottom: none; }
    .source-icon { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; overflow: hidden; }
    .source-icon img { width: 30px; height: 30px; border-radius: 8px; object-fit: cover; }
    .legend-name { font-size: 13px; color: #333; flex: 1; }
    .legend-pct { font-size: 12px; color: #bbb; margin-right: 2px; }
    .legend-amt { font-size: 13px; font-weight: 600; color: #222; }
    .legend-del { font-size: 18px; color: #e07050; margin-left: 4px; opacity: 0; transition: opacity 0.15s; cursor: pointer; padding: 4px; }
    .legend-item:hover .legend-del { opacity: 1; }
    .legend-item:active .legend-del { opacity: 1; }
    .net-card { display: flex; justify-content: space-between; align-items: center; background: #f7f7f7; border-radius: 14px; padding: 1.1rem 1.25rem; margin-top: 1.25rem; border: 0.5px solid #eee; }
    .net-label { font-size: 14px; color: #aaa; }
    .net-positive { color: #6a9e40; font-size: 22px; font-weight: 700; }
    .net-negative { color: #e07050; font-size: 22px; font-weight: 700; }
    .add-btn { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 28px); right: 24px; width: 60px; height: 60px; border-radius: 50%; background: #e8b84b; color: #fff; font-size: 30px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(232,184,75,0.5); transition: background 0.2s, transform 0.1s; z-index: 100; }
    .add-btn:active { transform: scale(0.93); background: #c49a3a; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; align-items: flex-end; justify-content: center; }
    .overlay.open { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet { background: #fff; border-radius: 24px 24px 0 0; padding: 1.5rem 1.25rem calc(env(safe-area-inset-bottom, 0px) + 2rem); width: 100%; max-width: 480px; border-top: 3px solid #e8b84b; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .sheet-handle { width: 36px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 0 auto 1.25rem; }
    .sheet h2 { font-size: 18px; font-weight: 700; color: #222; margin-bottom: 1.25rem; }
    .form-row { margin-bottom: 14px; }
    .form-row label { font-size: 12px; color: #aaa; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
    .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .type-btn { flex: 1; padding: 12px; border: 0.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; background: #f7f7f7; color: #888; transition: background 0.15s, transform 0.1s; }
    .type-btn:active { transform: scale(0.97); }
    .type-btn.active.income { background: #fff8e6; color: #a07010; border-color: #e8b84b; }
    .type-btn.active.expense { background: #ffeee8; color: #c04020; border-color: #e07050; }
    .source-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
    .source-chip { padding: 10px 6px; border: 0.5px solid #e8e8e8; border-radius: 12px; font-size: 11px; font-weight: 500; cursor: pointer; background: #fafafa; color: #444; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: background 0.15s, transform 0.1s; }
    .source-chip:active { transform: scale(0.95); }
    .source-chip:hover { background: #fff8e6; border-color: #e8b84b; }
    .source-chip.selected { background: #fff8e6; border-color: #e8b84b; color: #a07010; }
    .chip-icon { width: 32px; height: 32px; border-radius: 9px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }
    .chip-icon img { width: 32px; height: 32px; object-fit: cover; border-radius: 9px; }
    .source-chip.custom-chip { border-style: dashed; color: #bbb; justify-content: center; font-size: 13px; }
    .custom-input-row { display: none; margin-bottom: 10px; }
    .custom-input-row.show { display: block; }
    .form-row input { width: 100%; padding: 14px; border: 0.5px solid #e0e0e0; border-radius: 12px; font-size: 17px; color: #222; background: #fafafa; outline: none; }
    .form-row input:focus { border-color: #e8b84b; background: #fff; }
    .sheet-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .btn-cancel { flex: 1; padding: 14px; border: 0.5px solid #e0e0e0; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: transparent; color: #888; }
    .btn-add { flex: 2; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; background: #e8b84b; color: #fff; transition: background 0.15s, transform 0.1s; }
    .btn-add:active { transform: scale(0.97); background: #c49a3a; }
    .toast { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 90px); left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 12px 22px; border-radius: 22px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    @media (min-width: 480px) {
      .wrap { padding-top: 1rem; }
      .total-card .amount { font-size: 46px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-left">
      <p>Your money, layered.</p>
      <img src="logo.png" alt="filo" height="44" />
    </div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <span id="month-label">March 2026</span>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="toggle-row">
    <button class="toggle-btn income-active" id="btn-income" onclick="setMode('income')">Income</button>
    <button class="toggle-btn inactive-expense" id="btn-expense" onclick="setMode('expense')">Expenses</button>
  </div>
  <div class="total-card income" id="total-card">
    <div class="label" id="total-label">Total income</div>
    <div class="amount" id="total-amount">$8,420</div>
    <div class="change-row">
      <span class="change-pill pill-good" id="change-pill">+12%</span>
      <span class="change-label" id="change-label">vs last month</span>
    </div>
  </div>
  <div class="sources-title" id="breakdown-title">Income breakdown</div>
  <div class="chart-wrap">
    <div class="donut-container">
      <svg viewBox="0 0 155 155" id="donut-svg"></svg>
      <div class="donut-center">
        <div class="amt" id="center-amt"></div>
        <div class="lbl" id="center-lbl">total</div>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
  <div class="net-card">
    <span class="net-label">Net this month</span>
    <span class="net-positive" id="net-amount">+$3,170</span>
  </div>
</div>

<button class="add-btn" onclick="openSheet()">+</button>
<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Add transaction</h2>
    <div class="type-toggle">
      <button class="type-btn active income" id="type-income" onclick="setType('income')">Income</button>
      <button class="type-btn expense" id="type-expense" onclick="setType('expense')">Expense</button>
    </div>
    <div class="form-row">
      <label id="source-label">Source</label>
      <div class="source-grid" id="source-grid"></div>
      <div class="custom-input-row" id="custom-input-row">
        <input type="text" id="input-custom" placeholder="Type source name..." />
      </div>
    </div>
    <div class="form-row">
      <label>Amount ($)</label>
      <input type="number" id="input-amount" placeholder="0.00" min="0" inputmode="decimal" />
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
      <button class="btn-add" onclick="addTransaction()">Add</button>
    </div>
  </div>
</div>

<script>
  const SOURCE_BRANDS = {
    "YouTube":        { color: "#FF0000", initials: "YT", logo: "https://www.google.com/s2/favicons?domain=youtube.com&sz=64" },
    "Venmo":          { color: "#3D95CE", initials: "V",  logo: "https://www.google.com/s2/favicons?domain=venmo.com&sz=64" },
    "Cash App":       { color: "#00D632", initials: "CA", logo: "https://www.google.com/s2/favicons?domain=cash.app&sz=64" },
    "PayPal":         { color: "#003087", initials: "PP", logo: "https://www.google.com/s2/favicons?domain=paypal.com&sz=64" },
    "Stripe":         { color: "#635BFF", initials: "S",  logo: "https://www.google.com/s2/favicons?domain=stripe.com&sz=64" },
    "Sponsorship":    { color: "#F7931E", initials: "SP", logo: null },
    "Merch":          { color: "#E8B84B", initials: "M",  logo: null },
    "Patreon":        { color: "#FF424D", initials: "P",  logo: "https://www.google.com/s2/favicons?domain=patreon.com&sz=64" },
    "Direct deposit": { color: "#2ECC71", initials: "DD", logo: null },
    "Rent":           { color: "#E07050", initials: "R",  logo: null },
    "Food":           { color: "#F39C12", initials: "F",  logo: null },
    "Software":       { color: "#3498DB", initials: "SW", logo: null },
    "Equipment":      { color: "#9B59B6", initials: "EQ", logo: null },
    "Ads":            { color: "#1DA1F2", initials: "AD", logo: null },
    "Transport":      { color: "#27AE60", initials: "TR", logo: null },
    "Utilities":      { color: "#E74C3C", initials: "UT", logo: null },
    "Subscriptions":  { color: "#8E44AD", initials: "SB", logo: null },
    "Other":          { color: "#95A5A6", initials: "OT", logo: null },
  };

  function getBrand(name) {
    return SOURCE_BRANDS[name] || { color: "#e8b84b", initials: name.slice(0,2).toUpperCase(), logo: null };
  }

  function iconHTML(name, size = 30) {
    const b = getBrand(name);
    if (b.logo) {
      return `<div class="source-icon" style="width:${size}px;height:${size}px;background:${b.color};">
        <img src="${b.logo}" onerror="this.parentElement.innerHTML='${b.initials}';this.parentElement.style.fontSize='${Math.round(size*0.38)}px';" />
      </div>`;
    }
    return `<div class="source-icon" style="width:${size}px;height:${size}px;background:${b.color};font-size:${Math.round(size*0.38)}px;">${b.initials}</div>`;
  }

  const DEFAULT_MONTHS = {
    "0": { label: "March 2026",
      income:  { items: [
        { name: "YouTube", amount: 3800 }, { name: "Venmo", amount: 2150 },
        { name: "Direct deposit", amount: 1600 }, { name: "Cash App", amount: 870 },
      ]},
      expense: { items: [
        { name: "Rent", amount: 2200 }, { name: "Software", amount: 1100 },
        { name: "Food", amount: 950 }, { name: "Other", amount: 1000 },
      ]},
    },
    "-1": { label: "February 2026",
      income:  { items: [
        { name: "YouTube", amount: 3200 }, { name: "Venmo", amount: 1980 },
        { name: "Direct deposit", amount: 1600 }, { name: "Cash App", amount: 730 },
      ]},
      expense: { items: [
        { name: "Rent", amount: 2200 }, { name: "Software", amount: 1000 },
        { name: "Food", amount: 850 }, { name: "Other", amount: 1000 },
      ]},
    },
    "-2": { label: "January 2026",
      income:  { items: [
        { name: "YouTube", amount: 2900 }, { name: "Venmo", amount: 1850 },
        { name: "Direct deposit", amount: 1600 }, { name: "Cash App", amount: 730 },
      ]},
      expense: { items: [
        { name: "Rent", amount: 2200 }, { name: "Software", amount: 1050 },
        { name: "Food", amount: 900 }, { name: "Other", amount: 1000 },
      ]},
    },
  };

  function saveData() { localStorage.setItem('filo_months', JSON.stringify(months)); }
  function loadData() {
    try {
      const saved = localStorage.getItem('filo_months');
      return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_MONTHS));
    } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_MONTHS)); }
  }

  function calcChange(current, previous, type) {
    if (!previous || previous === 0) return null;
    const pct = Math.round(((current - previous) / previous) * 100);
    const isGood = type === "income" ? pct >= 0 : pct <= 0;
    const sign = pct >= 0 ? "+" : "";
    return { text: sign + pct + "%", isGood };
  }

  const INCOME_SOURCES = ["YouTube","Venmo","Cash App","PayPal","Stripe","Sponsorship","Merch","Patreon","Direct deposit"];
  const EXPENSE_SOURCES = ["Rent","Food","Software","Equipment","Ads","Transport","Utilities","Subscriptions","Other"];

  let months = loadData();
  let offset = 0, mode = "income", entryType = "income", selectedSource = null;
  function getTotal(items) { return items.reduce((s, x) => s + x.amount, 0); }

  function buildSourceGrid() {
    const sources = entryType === "income" ? INCOME_SOURCES : EXPENSE_SOURCES;
    document.getElementById("source-label").textContent = entryType === "income" ? "Source" : "Category";
    selectedSource = null;
    document.getElementById("custom-input-row").classList.remove("show");
    document.getElementById("input-custom").value = "";
    document.getElementById("source-grid").innerHTML =
      sources.map(s => {
        const b = getBrand(s);
        const icon = b.logo
          ? `<div class="chip-icon"><img src="${b.logo}" onerror="this.parentElement.innerHTML='${b.initials}';this.parentElement.style.background='${b.color}';" /></div>`
          : `<div class="chip-icon" style="background:${b.color};">${b.initials}</div>`;
        return `<div class="source-chip" onclick="selectSource('${s}', this)">${icon}${s}</div>`;
      }).join("") +
      `<div class="source-chip custom-chip" onclick="selectSource('__custom__', this)">+ Custom</div>`;
  }

  function selectSource(name, el) {
    selectedSource = name;
    document.querySelectorAll(".source-chip").forEach(c => c.classList.remove("selected"));
    el.classList.add("selected");
    if (name === "__custom__") {
      document.getElementById("custom-input-row").classList.add("show");
      document.getElementById("input-custom").focus();
    } else {
      document.getElementById("custom-input-row").classList.remove("show");
    }
  }

  function drawDonut(items, total, highlightIdx = -1) {
    const svg = document.getElementById("donut-svg");
    svg.innerHTML = "";
    const cx = 77, cy = 77, r = 57, sw = 27;
    let angle = -Math.PI / 2;
    const resetZone = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    resetZone.setAttribute("cx", cx);
    resetZone.setAttribute("cy", cy);
    resetZone.setAttribute("r", r + sw);
    resetZone.setAttribute("fill", "transparent");
    resetZone.addEventListener("mouseleave", () => {
      drawDonut(items, total, -1);
      document.getElementById("center-amt").textContent = "$" + total.toLocaleString();
      document.getElementById("center-lbl").textContent = "total";
    });
    svg.appendChild(resetZone);
    items.forEach((s, i) => {
      const color = getBrand(s.name).color;
      const sweep = (s.amount / total) * 2 * Math.PI;
      const gap = 0.03;
      const a1 = angle + gap / 2, a2 = angle + sweep - gap / 2;
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      const large = sweep > Math.PI ? 1 : 0;
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", color);
      path.setAttribute("stroke-width", highlightIdx === i ? sw + 5 : sw);
      path.setAttribute("stroke-linecap", "round");
      path.style.opacity = highlightIdx === -1 || highlightIdx === i ? "1" : "0.3";
      path.style.cursor = "pointer";
      path.style.transition = "stroke-width 0.2s, opacity 0.2s";
      path.addEventListener("mouseenter", () => {
        drawDonut(items, total, i);
        document.getElementById("center-amt").textContent = "$" + s.amount.toLocaleString();
        document.getElementById("center-lbl").textContent = s.name;
      });
      path.addEventListener("click", () => {
        drawDonut(items, total, i);
        document.getElementById("center-amt").textContent = "$" + s.amount.toLocaleString();
        document.getElementById("center-lbl").textContent = s.name;
        setTimeout(() => {
          drawDonut(items, total, -1);
          document.getElementById("center-amt").textContent = "$" + total.toLocaleString();
          document.getElementById("center-lbl").textContent = "total";
        }, 1800);
      });
      svg.appendChild(path);
      angle += sweep;
    });
  }

  function renderLegend(items, total) {
    document.getElementById("legend").innerHTML = items.map(s => {
      const pct = Math.round(s.amount / total * 100);
      return `<div class="legend-item">
        ${iconHTML(s.name, 30)}
        <span class="legend-name">${s.name}</span>
        <span class="legend-pct">${pct}%</span>
        <span class="legend-amt">$${s.amount.toLocaleString()}</span>
        <span class="legend-del" onclick="deleteItem('${s.name}')">&#215;</span>
      </div>`;
    }).join("");
  }

  function deleteItem(name) {
    const d = months[String(offset)] || months["0"];
    const list = d[mode].items;
    const idx = list.findIndex(x => x.name === name);
    if (idx > -1) { list.splice(idx, 1); saveData(); render(); showToast(name + " removed"); }
  }

  function render() {
    const d = months[String(offset)] || months["0"];
    const prev = months[String(offset - 1)];
    const data = d[mode];
    const items = data.items;
    const total = getTotal(items);
    const net = getTotal(d.income.items) - getTotal(d.expense.items);

    document.getElementById("month-label").textContent = d.label;
    document.getElementById("total-amount").textContent = "$" + total.toLocaleString();
    document.getElementById("total-card").className = "total-card " + mode;
    document.getElementById("total-label").textContent = mode === "income" ? "Total income" : "Total expenses";
    document.getElementById("breakdown-title").textContent = mode === "income" ? "Income breakdown" : "Expense breakdown";

    const pill = document.getElementById("change-pill");
    const label = document.getElementById("change-label");
    if (prev) {
      const prevTotal = getTotal(prev[mode].items);
      const change = calcChange(total, prevTotal, mode);
      if (change) {
        pill.textContent = change.text;
        pill.className = "change-pill " + (change.isGood ? "pill-good" : "pill-bad");
        label.textContent = "vs last month";
      }
    } else {
      pill.textContent = "—";
      pill.className = "change-pill pill-good";
      label.textContent = "no prior data";
    }

    const netEl = document.getElementById("net-amount");
    netEl.textContent = (net >= 0 ? "+" : "-") + "$" + Math.abs(net).toLocaleString();
    netEl.className = net >= 0 ? "net-positive" : "net-negative";

    document.getElementById("center-amt").textContent = "$" + total.toLocaleString();
    document.getElementById("center-lbl").textContent = "total";

    drawDonut(items, total);
    renderLegend(items, total);
  }

  function setMode(m) {
    mode = m;
    document.getElementById("btn-income").className = "toggle-btn" + (m === "income" ? " income-active" : " inactive-income");
    document.getElementById("btn-expense").className = "toggle-btn" + (m === "expense" ? " expense-active" : " inactive-expense");
    render();
  }

  function changeMonth(dir) {
    const next = offset + dir;
    if (months[String(next)]) { offset = next; render(); }
  }

  function openSheet() {
    entryType = mode;
    document.getElementById("type-income").className = "type-btn" + (entryType === "income" ? " active income" : "");
    document.getElementById("type-expense").className = "type-btn" + (entryType === "expense" ? " active expense" : "");
    buildSourceGrid();
    document.getElementById("input-amount").value = "";
    document.getElementById("overlay").classList.add("open");
  }

  function closeSheet() { document.getElementById("overlay").classList.remove("open"); }
  function closeIfOutside(e) { if (e.target === document.getElementById("overlay")) closeSheet(); }

  function setType(t) {
    entryType = t;
    document.getElementById("type-income").className = "type-btn" + (t === "income" ? " active income" : "");
    document.getElementById("type-expense").className = "type-btn" + (t === "expense" ? " active expense" : "");
    buildSourceGrid();
  }

  function addTransaction() {
    let name = selectedSource;
    if (name === "__custom__") name = document.getElementById("input-custom").value.trim();
    const amount = parseFloat(document.getElementById("input-amount").value);
    if (!name || !amount || amount <= 0) { showToast("Pick a source and enter an amount"); return; }
    const mo = months[String(offset)] || months["0"];
    const list = mo[entryType].items;
    const existing = list.find(x => x.name.toLowerCase() === name.toLowerCase());
    if (existing) { existing.amount += amount; }
    else { list.push({ name, amount }); }
    saveData();
    closeSheet();
    if (mode !== entryType) setMode(entryType);
    else render();
    showToast("$" + amount.toLocaleString() + " added to " + name);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  render();
</script>
</body>
</html>
